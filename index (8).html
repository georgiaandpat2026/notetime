<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Notetime</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f5f2ee; --surface: #fff; --surface2: #ede9e3; --border: #ddd8d0;
    --text: #1a1714; --muted: #7a746c; --accent: #c85a2a; --accent-light: #f5e6de;
    --green: #2a7a5a; --green-light: #dff0e8; --danger: #c0392b;
    --radius: 10px; --shadow: 0 2px 12px rgba(0,0,0,.07);
    --mono: 'DM Mono', monospace; --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }

  /* PICKER */
  #picker { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .picker-card { background: var(--surface); border-radius: 20px; padding: 44px 32px 40px; width: 100%; max-width: 340px; box-shadow: var(--shadow); border: 1.5px solid var(--border); text-align: center; }
  .picker-logo { font-family: var(--mono); font-size: 26px; font-weight: 500; color: var(--accent); margin-bottom: 6px; }
  .picker-tag  { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 40px; }
  .picker-lbl  { font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; font-family: var(--mono); margin-bottom: 16px; }
  .name-list   { display: flex; flex-direction: column; gap: 12px; }
  .name-btn    { width: 100%; padding: 16px 20px; border-radius: var(--radius); border: 1.5px solid var(--border); background: var(--surface); font-family: var(--sans); font-size: 17px; font-weight: 500; color: var(--text); cursor: pointer; display: flex; align-items: center; gap: 14px; transition: all .15s; }
  .name-btn:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); transform: translateY(-1px); }
  .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent-light); color: var(--accent); font-family: var(--mono); font-size: 14px; font-weight: 500; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  /* APP SHELL */
  #app { display: none; min-height: 100vh; flex-direction: column; max-width: 520px; margin: 0 auto; background: var(--surface); }
  #app.on { display: flex; }
  .topbar { background: var(--surface); border-bottom: 1.5px solid var(--border); padding: 0 16px; height: 54px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
  .topbar-logo { font-family: var(--mono); font-size: 17px; font-weight: 500; color: var(--accent); }
  .topbar-right { display: flex; align-items: center; gap: 6px; }
  .topbar-pill { font-size: 12px; color: var(--muted); font-family: var(--mono); background: var(--surface2); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); }
  .main { flex: 1; padding: 20px 16px 90px; }
  .screen { display: none; } .screen.active { display: block; }
  .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 520px; background: var(--surface); border-top: 1.5px solid var(--border); display: flex; z-index: 50; padding-bottom: env(safe-area-inset-bottom); }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px; cursor: pointer; border: none; background: transparent; font-family: var(--sans); color: var(--muted); font-size: 10px; font-weight: 500; transition: color .15s; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; }

  /* FORMS */
  label { display: block; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 6px; font-family: var(--mono); }
  input, select, textarea { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius); font-family: var(--sans); font-size: 15px; color: var(--text); background: var(--surface); outline: none; transition: border-color .15s; appearance: none; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 76px; }
  .field { margin-bottom: 16px; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 18px; border-radius: var(--radius); font-family: var(--sans); font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; }
  .btn-primary   { background: var(--accent); color: white; } .btn-primary:hover { background: #b04d22; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1.5px solid var(--border); } .btn-secondary:hover { background: var(--border); }
  .btn-ghost     { background: transparent; color: var(--muted); padding: 8px 12px; font-size: 13px; } .btn-ghost:hover { color: var(--text); background: var(--surface2); }
  .btn-green     { background: var(--green); color: white; } .btn-green:hover { background: #236648; }
  .btn-danger    { background: var(--danger); color: white; }
  .btn-sm        { padding: 7px 13px; font-size: 13px; }

  /* DASHBOARD */
  .dash-hd { margin-bottom: 20px; }
  .dash-hd h1 { font-size: 22px; font-weight: 600; }
  .dash-hd p  { color: var(--muted); font-size: 13px; margin-top: 3px; font-family: var(--mono); }
  .log-btn { width: 100%; padding: 16px; font-size: 16px; font-weight: 600; border-radius: 12px; background: var(--accent); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; font-family: var(--sans); box-shadow: 0 4px 16px rgba(200,90,42,.28); transition: all .15s; }
  .log-btn:hover { background: #b04d22; transform: translateY(-1px); }
  .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--surface2); border-radius: var(--radius); padding: 14px; }
  .stat-card.accent { background: var(--accent); color: white; }
  .stat-card.accent .stat-lbl { color: rgba(255,255,255,.7); }
  .stat-val { font-family: var(--mono); font-size: 28px; font-weight: 500; line-height: 1; margin-bottom: 3px; }
  .stat-lbl { font-size: 11px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: .05em; }
  .card { background: var(--surface); border-radius: var(--radius); border: 1.5px solid var(--border); padding: 16px; margin-bottom: 12px; }
  .card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); font-family: var(--mono); margin-bottom: 10px; }
  .cat-bar-row  { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .cat-bar-lbl  { font-size: 12px; color: var(--muted); width: 130px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cat-bar-track{ flex: 1; height: 7px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .cat-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; }
  .cat-bar-time { font-family: var(--mono); font-size: 11px; color: var(--muted); width: 42px; text-align: right; flex-shrink: 0; }

  /* ENTRY CARDS */
  .entry-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 9px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; cursor: pointer; transition: border-color .12s; }
  .entry-card:hover { border-color: var(--accent); }
  .entry-card.billed { background: #fafaf8; }
  .entry-cat  { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--accent); font-family: var(--mono); margin-bottom: 2px; }
  .entry-who  { font-size: 14px; font-weight: 500; color: var(--text); }
  .entry-note { font-size: 12px; color: var(--muted); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .entry-meta { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 3px; }
  .entry-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
  .entry-dur  { font-family: var(--mono); font-size: 15px; font-weight: 500; }
  .billed-badge { font-size: 10px; font-weight: 600; font-family: var(--mono); text-transform: uppercase; letter-spacing: .05em; padding: 2px 7px; border-radius: 20px; background: var(--green-light); color: var(--green); }
  .unbilled-badge { font-size: 10px; font-weight: 600; font-family: var(--mono); text-transform: uppercase; letter-spacing: .05em; padding: 2px 7px; border-radius: 20px; background: var(--accent-light); color: var(--accent); }
  .sec-hd { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); font-family: var(--mono); margin: 18px 0 9px; display: flex; justify-content: space-between; }

  /* CATEGORY GRID */
  .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 4px; }
  .cat-btn { padding: 11px 10px; border-radius: var(--radius); border: 1.5px solid var(--border); background: var(--surface); cursor: pointer; font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--muted); text-align: left; display: flex; align-items: center; gap: 7px; transition: all .12s; }
  .cat-btn:hover { border-color: var(--accent); color: var(--text); background: var(--accent-light); }
  .cat-btn.sel   { border-color: var(--accent); background: var(--accent-light); color: var(--accent); font-weight: 600; }

  /* CLIENT CARDS — billing summary */
  .client-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: border-color .12s; }
  .client-card:hover { border-color: var(--accent); }
  .client-card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .client-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent-light); color: var(--accent); font-family: var(--mono); font-size: 13px; font-weight: 500; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .client-info { flex: 1; min-width: 0; }
  .client-name { font-weight: 600; font-size: 15px; }
  .client-sub  { font-size: 12px; color: var(--muted); font-family: var(--mono); }
  .client-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .billing-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .billing-pill { border-radius: 8px; padding: 8px 12px; }
  .billing-pill.unbilled { background: var(--accent-light); }
  .billing-pill.billed   { background: var(--green-light); }
  .billing-pill-val { font-family: var(--mono); font-size: 18px; font-weight: 500; color: var(--text); line-height: 1; margin-bottom: 2px; }
  .billing-pill.unbilled .billing-pill-val { color: var(--accent); }
  .billing-pill.billed   .billing-pill-val { color: var(--green); }
  .billing-pill-lbl { font-size: 11px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: .05em; }
  .client-no-entries { font-size: 12px; color: var(--muted); font-family: var(--mono); padding: 4px 0; }
  .archived { opacity: .45; }

  /* MODAL / SHEETS */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; }
  .overlay.open { opacity: 1; pointer-events: all; }
  .sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px 20px 40px; width: 100%; max-width: 520px; max-height: 92vh; overflow-y: auto; transform: translateY(100%); transition: transform .25s cubic-bezier(.32,.72,0,1); }
  .overlay.open .sheet { transform: translateY(0); }
  .sheet-handle  { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 18px; }
  .sheet-title   { font-size: 18px; font-weight: 600; margin-bottom: 18px; }
  .sheet-actions { display: flex; gap: 8px; margin-top: 18px; }
  .sheet-actions .btn { flex: 1; }

  /* CLIENT DETAIL SHEET */
  .client-detail-hd { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .client-detail-hd .client-avatar { width: 44px; height: 44px; font-size: 16px; }
  .client-detail-hd h2 { font-size: 20px; font-weight: 600; }
  .client-detail-hd p  { font-size: 12px; color: var(--muted); font-family: var(--mono); }
  .billing-summary-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .bs-card { border-radius: var(--radius); padding: 12px 14px; }
  .bs-card.unbilled { background: var(--accent-light); }
  .bs-card.billed   { background: var(--green-light); }
  .bs-val { font-family: var(--mono); font-size: 22px; font-weight: 500; line-height: 1; margin-bottom: 3px; }
  .bs-card.unbilled .bs-val { color: var(--accent); }
  .bs-card.billed   .bs-val { color: var(--green); }
  .bs-lbl { font-size: 11px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: .05em; }
  .detail-filter-row { display: flex; gap: 7px; margin-bottom: 14px; }
  .detail-entry-row { display: flex; align-items: flex-start; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .detail-entry-row:last-child { border-bottom: none; }
  .detail-entry-info { flex: 1; min-width: 0; }
  .detail-entry-cat  { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--accent); font-family: var(--mono); margin-bottom: 1px; }
  .detail-entry-note { font-size: 12px; color: var(--muted); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .detail-entry-meta { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }
  .detail-entry-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
  .detail-entry-dur  { font-family: var(--mono); font-size: 14px; font-weight: 500; }
  .bill-action-btn { font-size: 11px; font-weight: 600; font-family: var(--mono); padding: 4px 10px; border-radius: 20px; cursor: pointer; border: 1.5px solid; transition: all .12s; white-space: nowrap; }
  .bill-action-btn.do-bill   { background: var(--green-light); color: var(--green); border-color: var(--green); }
  .bill-action-btn.do-bill:hover { background: var(--green); color: white; }
  .bill-action-btn.do-unbill { background: var(--surface2); color: var(--muted); border-color: var(--border); }
  .bill-action-btn.do-unbill:hover { background: var(--border); color: var(--text); }

  /* TIMER */
  .timer-disp { font-family: var(--mono); font-size: 40px; font-weight: 300; text-align: center; color: var(--accent); padding: 12px 0 10px; letter-spacing: 2px; }
  .timer-row  { display: flex; gap: 8px; margin-bottom: 10px; }
  .timer-row .btn { flex: 1; }
  .or-div { text-align: center; color: var(--muted); font-size: 12px; font-family: var(--mono); margin: 12px 0; position: relative; }
  .or-div::before,.or-div::after { content:''; position: absolute; top: 50%; width: calc(50% - 24px); height: 1px; background: var(--border); }
  .or-div::before { left: 0; } .or-div::after { right: 0; }
  .dur-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .dur-row .field { margin-bottom: 0; }

  /* MISC */
  .page-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .page-hd h1 { font-size: 22px; font-weight: 600; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px; }
  .chip { flex-shrink: 0; padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; font-family: var(--mono); border: 1.5px solid var(--border); background: var(--surface); cursor: pointer; color: var(--muted); transition: all .12s; }
  .chip.active { background: var(--accent); border-color: var(--accent); color: white; }
  .empty { text-align: center; padding: 40px 16px; color: var(--muted); font-size: 13px; line-height: 1.7; }
  .err   { color: var(--danger); font-size: 13px; margin-top: 8px; font-family: var(--mono); }
  .toast { position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%) translateY(14px); background: var(--text); color: white; padding: 9px 20px; border-radius: 24px; font-size: 14px; font-weight: 500; opacity: 0; transition: all .22s; z-index: 200; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- PICKER -->
<div id="picker">
  <div class="picker-card">
    <div class="picker-logo">notetime</div>
    <div class="picker-tag">non-contact time tracker</div>
    <div class="picker-lbl">Who's logging today?</div>
    <div class="name-list">
      <button class="name-btn" onclick="selectUser('georgia','Georgia')"><div class="avatar">G</div>Georgia</button>
      <button class="name-btn" onclick="selectUser('elise','Elise')"><div class="avatar">E</div>Elise</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="topbar">
    <div class="topbar-logo">notetime</div>
    <div class="topbar-right">
      <span class="topbar-pill" id="topbar-name"></span>
      <button class="btn btn-ghost btn-sm" onclick="switchUser()">Switch</button>
    </div>
  </header>

  <div class="main">

    <!-- DASHBOARD -->
    <div class="screen active" id="screen-dashboard">
      <div class="dash-hd">
        <h1 id="dash-greeting"></h1>
        <p id="dash-date"></p>
      </div>
      <button class="log-btn" onclick="openLog()">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        Log non-contact time
      </button>
      <div class="stat-row">
        <div class="stat-card accent"><div class="stat-val" id="dash-week">0h</div><div class="stat-lbl">This week</div></div>
        <div class="stat-card"><div class="stat-val" id="dash-today">0h</div><div class="stat-lbl">Today</div></div>
      </div>
      <div class="card">
        <div class="card-title">This week by category</div>
        <div id="dash-breakdown"></div>
      </div>
      <div class="card">
        <div class="card-title">Recent entries</div>
        <div id="dash-recent"></div>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="screen" id="screen-history">
      <div class="page-hd"><h1>History</h1></div>
      <div class="filter-row" id="hist-filters"></div>
      <div id="hist-list"></div>
    </div>

    <!-- CLIENTS -->
    <div class="screen" id="screen-clients">
      <div class="page-hd">
        <h1>Clients</h1>
        <button class="btn btn-primary btn-sm" onclick="openClientSheet()">+ Add client</button>
      </div>
      <div class="filter-row" id="client-filters"></div>
      <div id="clients-list"></div>
    </div>

  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-dashboard" onclick="showScreen('dashboard')">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Home
    </button>
    <button class="nav-btn" id="nav-history" onclick="showScreen('history')">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      History
    </button>
    <button class="nav-btn" id="nav-clients" onclick="showScreen('clients')">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      Clients
    </button>
  </nav>
</div>

<!-- LOG SHEET -->
<div class="overlay" id="log-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Log non-contact time</div>
    <div id="log-content"></div>
  </div>
</div>

<!-- CLIENT ADD/EDIT SHEET -->
<div class="overlay" id="client-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="client-sheet-title">Add client</div>
    <div class="field"><label>Name or initials</label><input id="c-name" placeholder="e.g. A. Smith" /></div>
    <div class="field"><label>Reference / file number (optional)</label><input id="c-ref" placeholder="e.g. OT-0042" /></div>
    <div class="field"><label>Notes (optional)</label><textarea id="c-notes" placeholder="Any relevant notes…"></textarea></div>
    <div id="c-err" class="err" style="display:none"></div>
    <div class="sheet-actions">
      <button class="btn btn-secondary" onclick="closeOverlay('client-overlay')">Cancel</button>
      <button class="btn btn-primary" onclick="saveClient()">Save client</button>
    </div>
  </div>
</div>

<!-- CLIENT DETAIL SHEET -->
<div class="overlay" id="detail-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div id="detail-content"></div>
  </div>
</div>

<!-- EDIT ENTRY SHEET -->
<div class="overlay" id="edit-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Edit entry</div>
    <div id="edit-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ── DB ──
async function loadData() {
  showLoading(true);
  const [{ data: c }, { data: e }] = await Promise.all([
    sb.from('clients').select('*'),
    sb.from('entires').select('*')
  ]);
  clients = (c||[]).map(mapClient);
  entries = (e||[]).map(mapEntry);
  showLoading(false);
}

// Map DB row (snake_case) → app object (camelCase)
function mapClient(r) {
  return { id:r.id, name:r.name, ref:r.ref||null, notes:r.notes||null, archived:r.archived||false };
}
function mapEntry(r) {
  return { id:r.id, userId:r.user_id, userName:r.user_name, cat:r.cat,
    clientId:r.client_id||null, mins:r.mins, notes:r.notes||null,
    date:r.date, ts:r.ts, billed:r.billed||false };
}

function showLoading(on) {
  let el=document.getElementById('loading-overlay');
  if(!el) {
    el=document.createElement('div');
    el.id='loading-overlay';
    el.style.cssText='position:fixed;inset:0;background:rgba(245,242,238,.85);z-index:999;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;color:var(--muted)';
    el.textContent='Loading…';
    document.body.appendChild(el);
  }
  el.style.display=on?'flex':'none';
}

// ── UTILS ──
function uid()      { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function todayStr() { return new Date().toISOString().split('T')[0]; }
function pad(n)     { return n.toString().padStart(2,'0'); }
function esc(s)     { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDur(m)  { const h=Math.floor(m/60),min=m%60; if(h&&min) return h+'h '+min+'m'; if(h) return h+'h'; return min+'m'; }
function fmtDate(d) {
  const t=todayStr(), y=new Date(Date.now()-86400000).toISOString().split('T')[0];
  if(d===t) return 'Today'; if(d===y) return 'Yesterday';
  return new Date(d+'T12:00:00').toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
}
function fmtTimer(s) {
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return h>0 ? pad(h)+':'+pad(m)+':'+pad(sec) : pad(m)+':'+pad(sec);
}
function openOverlay(id)  { document.getElementById(id).classList.add('open'); }
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }
function toast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}
document.querySelectorAll('.overlay').forEach(o=>{
  o.addEventListener('click',e=>{ if(e.target===o){o.classList.remove('open');if(o.id==='log-overlay')clearTimer();} });
});

// ── NAVIGATION ──
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(n=>n.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');

  if(name==='history') loadHistory();
  if(name==='clients') renderClients();

// ── DASHBOARD ──
function refreshDash() {
  if(!user) return;
  const now=new Date(), days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const h=now.getHours();
  document.getElementById('dash-greeting').textContent=(h<12?'Good morning':h<17?'Good afternoon':'Good evening')+', '+user.name;
  document.getElementById('dash-date').textContent=days[now.getDay()]+', '+now.toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'});

  const ws=new Date(now); ws.setDate(now.getDate()-((now.getDay()+6)%7)); ws.setHours(0,0,0,0);
  const wsStr=ws.toISOString().split('T')[0], today=todayStr();
  const mine=entries.filter(e=>e.userId===user.id);
  const week=mine.filter(e=>e.date>=wsStr);

  document.getElementById('dash-week').textContent =fmtDur(week.reduce((a,e)=>a+e.mins,0));
  document.getElementById('dash-today').textContent=fmtDur(week.filter(e=>e.date===today).reduce((a,e)=>a+e.mins,0));

  const bEl=document.getElementById('dash-breakdown');
  if(!week.length) { bEl.innerHTML='<div style="font-size:12px;color:var(--muted);font-family:var(--mono)">No entries this week yet</div>'; }
  else {
    const byCat={};
    week.forEach(e=>{byCat[e.cat]=(byCat[e.cat]||0)+e.mins;});
    const sorted=Object.entries(byCat).sort((a,b)=>b[1]-a[1]), max=sorted[0][1];
    bEl.innerHTML=sorted.map(([catId,mins])=>{
      const cat=CATS.find(c=>c.id===catId);
      return `<div class="cat-bar-row"><div class="cat-bar-lbl">${cat?cat.icon+' '+cat.label:catId}</div><div class="cat-bar-track"><div class="cat-bar-fill" style="width:${Math.round(mins/max*100)}%"></div></div><div class="cat-bar-time">${fmtDur(mins)}</div></div>`;
    }).join('');
  }

  const recent=mine.slice().sort((a,b)=>b.ts-a.ts).slice(0,4);
  document.getElementById('dash-recent').innerHTML=recent.length
    ? recent.map(e=>entryCardHTML(e)).join('')
    : '<div style="font-size:12px;color:var(--muted);font-family:var(--mono)">No entries yet</div>';
}

  logCat=id;
  CATS.forEach(c=>{ const b=document.getElementById('cb-'+c.id); if(b) b.classList.toggle('sel',c.id===id); });
}

async function submitLog() {
  const err=document.getElementById('l-err'); err.style.display='none';
  if(!logCat)           { err.textContent='Please select a category'; err.style.display='block'; return; }
  // If timer is still running, stop it and fill in the fields
  if(timerOn) {
    clearInterval(timerInt); timerOn=false;
    const tot=Math.round(timerSec/60);
    document.getElementById('t-btn').textContent='▶ Resume';
    document.getElementById('l-h').value=Math.floor(tot/60)||'';
    document.getElementById('l-m').value=tot%60||'';
  }
  const h=parseInt(document.getElementById('l-h').value)||0;
  const m=parseInt(document.getElementById('l-m').value)||0;
  if(h*60+m<=0)         { err.textContent='Please enter a duration';  err.style.display='block'; return; }
  const date=document.getElementById('l-date').value;
  if(!date)             { err.textContent='Please select a date';     err.style.display='block'; return; }
  const newEntry = { id:uid(), userId:user.id, userName:user.name, cat:logCat,
    clientId:document.getElementById('l-client').value||null,
    mins:h*60+m, notes:document.getElementById('l-notes').value.trim()||null,
    date, ts:Date.now(), billed:false };
  const { error } = await sb.from('entires').insert({
    id:newEntry.id, user_id:newEntry.userId, user_name:newEntry.userName,
    cat:newEntry.cat, client_id:newEntry.clientId, mins:newEntry.mins,
    notes:newEntry.notes, date:newEntry.date, ts:newEntry.ts, billed:false
  });
  if(error) { err.textContent='Error saving. Please try again.'; err.style.display='block'; return; }
  entries.push(newEntry);
  clearTimer(); closeOverlay('log-overlay'); toast('Time logged ✓');
  refreshDash();
  if(document.getElementById('screen-history').classList.contains('active')) loadHistory();
  if(document.getElementById('screen-clients').classList.contains('active')) renderClients();
}

// ── TIMER ──
function toggleTimer() {
  if(timerOn) {
    clearInterval(timerInt); timerOn=false;
    document.getElementById('t-btn').textContent='▶ Resume';
    const tot=Math.round(timerSec/60);
    document.getElementById('l-h').value=Math.floor(tot/60)||'';
    document.getElementById('l-m').value=tot%60||'';
  } else {
    timerOn=true; document.getElementById('t-btn').textContent='⏸ Pause';
    timerInt=setInterval(()=>{ timerSec++; const el=document.getElementById('t-disp'); if(el) el.textContent=fmtTimer(timerSec); },1000);
  }
}
function resetTimer() {
  clearTimer();
  const el=document.getElementById('t-disp'), btn=document.getElementById('t-btn');
  if(el) el.textContent='00:00'; if(btn) btn.textContent='▶ Start timer';
}
function clearTimer() { clearInterval(timerInt); timerOn=false; timerSec=0; }

// ── HISTORY ──
function renderHistFilters() {
  document.getElementById('hist-filters').innerHTML=
    [['week','This week'],['month','This month'],['all','All time']].map(([id,l])=>
      `<button class="chip${histFilter===id?' active':''}" onclick="setHistFilter('${id}')">${l}</button>`).join('');
}
function setHistFilter(f) { histFilter=f; renderHistFilters(); loadHistory(); }

function loadHistory() {
  const now=new Date();
  let f=entries.filter(e=>e.userId===user.id);
  if(histFilter==='week') {
    const ws=new Date(now); ws.setDate(now.getDate()-((now.getDay()+6)%7)); ws.setHours(0,0,0,0);
    f=f.filter(e=>e.date>=ws.toISOString().split('T')[0]);
  } else if(histFilter==='month') {
    f=f.filter(e=>e.date>=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0]);
  }
  f.sort((a,b)=>b.date.localeCompare(a.date)||b.ts-a.ts);
  const el=document.getElementById('hist-list');
  if(!f.length) { el.innerHTML='<div class="empty">No entries yet.<br>Tap the button on the home screen to log time.</div>'; return; }
  const grouped={};
  f.forEach(e=>{ if(!grouped[e.date]) grouped[e.date]=[]; grouped[e.date].push(e); });
  el.innerHTML=Object.entries(grouped).map(([date,es])=>
    `<div class="sec-hd"><span>${fmtDate(date)}</span><span style="font-weight:400">${fmtDur(es.reduce((a,e)=>a+e.mins,0))}</span></div>`
    +es.map(e=>entryCardHTML(e)).join('')
  ).join('');
}

// ── CLIENTS LIST ──
function renderClientFilters() {
  document.getElementById('client-filters').innerHTML=
    [['active','Active'],['archived','Archived']].map(([id,l])=>
      `<button class="chip${clientFilter===id?' active':''}" onclick="setClientFilter('${id}')">${l}</button>`).join('');
}
function setClientFilter(f) { clientFilter=f; renderClientFilters(); renderClients(); }

function renderClients() {
  const list = clientFilter==='archived' ? clients.filter(c=>c.archived) : clients.filter(c=>!c.archived);
  const el=document.getElementById('clients-list');
  if(!list.length) {
    el.innerHTML=`<div class="empty">${clientFilter==='archived'?'No archived clients.':'No clients yet.<br>Add your first client above.'}</div>`;
    return;
  }
  el.innerHTML=list.map(c=>clientCardHTML(c)).join('');
}

function clientCardHTML(c) {
  const ini=c.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const clientEntries=entries.filter(e=>e.clientId===c.id);
  const unbilledMins=clientEntries.filter(e=>!e.billed).reduce((a,e)=>a+e.mins,0);
  const billedMins  =clientEntries.filter(e=> e.billed).reduce((a,e)=>a+e.mins,0);
  const hasEntries  =clientEntries.length>0;
  return `<div class="client-card${c.archived?' archived':''}" onclick="openClientDetail('${c.id}')">
    <div class="client-card-top">
      <div class="client-avatar">${ini}</div>
      <div class="client-info">
        <div class="client-name">${esc(c.name)}</div>
        ${c.ref?`<div class="client-sub">${esc(c.ref)}</div>`:''}
      </div>
      <div class="client-actions" onclick="event.stopPropagation()">
        <button class="btn btn-ghost btn-sm" onclick="openClientSheet('${c.id}')">Edit</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleArchive('${c.id}',${!c.archived})">${c.archived?'Restore':'Archive'}</button>
      </div>
    </div>
    ${hasEntries ? `
    <div class="billing-row">
      <div class="billing-pill unbilled">
        <div class="billing-pill-val">${fmtDur(unbilledMins)}</div>
        <div class="billing-pill-lbl">Unbilled</div>
      </div>
      <div class="billing-pill billed">
        <div class="billing-pill-val">${fmtDur(billedMins)}</div>
        <div class="billing-pill-lbl">Billed</div>
      </div>
    </div>` : `<div class="client-no-entries">No entries yet</div>`}
  </div>`;
}

// ── CLIENT DETAIL (billing) ──
let detailClientId   = null;
let detailBillFilter = 'unbilled';

function openClientDetail(id) {
  detailClientId=id; detailBillFilter='unbilled';
  renderDetailSheet();
  openOverlay('detail-overlay');
}

function renderDetailSheet() {
  const c=clients.find(x=>x.id===detailClientId); if(!c) return;
  const ini=c.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const allEntries=entries.filter(e=>e.clientId===c.id).sort((a,b)=>b.date.localeCompare(a.date)||b.ts-a.ts);
  const unbilledMins=allEntries.filter(e=>!e.billed).reduce((a,e)=>a+e.mins,0);
  const billedMins  =allEntries.filter(e=> e.billed).reduce((a,e)=>a+e.mins,0);
  const filtered    =allEntries.filter(e=>detailBillFilter==='all'||(detailBillFilter==='unbilled'?!e.billed:e.billed));

  document.getElementById('detail-content').innerHTML=`
    <div class="client-detail-hd">
      <div class="client-avatar" style="width:44px;height:44px;font-size:16px">${ini}</div>
      <div>
        <h2 style="font-size:20px;font-weight:600">${esc(c.name)}</h2>
        ${c.ref?`<p style="font-size:12px;color:var(--muted);font-family:var(--mono)">${esc(c.ref)}</p>`:''}
      </div>
    </div>
    <div class="billing-summary-row">
      <div class="bs-card unbilled">
        <div class="bs-val">${fmtDur(unbilledMins)}</div>
        <div class="bs-lbl">Unbilled</div>
      </div>
      <div class="bs-card billed">
        <div class="bs-val">${fmtDur(billedMins)}</div>
        <div class="bs-lbl">Billed</div>
      </div>
    </div>
    <div class="detail-filter-row">
      ${[['unbilled','Unbilled'],['billed','Billed'],['all','All']].map(([id,l])=>
        `<button class="chip${detailBillFilter===id?' active':''}" onclick="setDetailFilter('${id}')">${l}</button>`).join('')}
    </div>
    <div id="detail-entries">
      ${!filtered.length
        ? `<div class="empty" style="padding:24px 0">No ${detailBillFilter==='all'?'':detailBillFilter} entries for this client</div>`
        : filtered.map(e=>detailEntryHTML(e)).join('')}
    </div>
    <div style="margin-top:16px">
      <button class="btn btn-secondary btn-sm" onclick="closeOverlay('detail-overlay')">Close</button>
    </div>`;
}

function detailEntryHTML(e) {
  const cat=CATS.find(c=>c.id===e.cat);
  const billBtn=e.billed
    ? `<button class="bill-action-btn do-unbill" onclick="toggleBilled('${e.id}')">Billed &mdash; undo</button>`
    : `<button class="bill-action-btn do-bill" onclick="toggleBilled('${e.id}')">Mark as billed</button>`;
  return `<div class="detail-entry-row">
    <div class="detail-entry-info">
      <div class="detail-entry-cat">${cat?cat.icon+' '+cat.label:e.cat}</div>
      ${e.notes?`<div class="detail-entry-note">${esc(e.notes)}</div>`:''}
      <div class="detail-entry-meta">${fmtDate(e.date)} · ${esc(e.userName)}</div>
    </div>
    <div class="detail-entry-right">
      <div class="detail-entry-dur">${fmtDur(e.mins)}</div>
      ${billBtn}
    </div>
  </div>`;
}

function setDetailFilter(f) { detailBillFilter=f; renderDetailSheet(); }

async function toggleBilled(entryId) {
  const e=entries.find(x=>x.id===entryId); if(!e) return;
  e.billed=!e.billed;
  await sb.from('entires').update({billed:e.billed}).eq('id',entryId);
  renderDetailSheet();
  renderClients();
  if(document.getElementById('screen-history').classList.contains('active')) loadHistory();
  if(document.getElementById('screen-dashboard').classList.contains('active')) refreshDash();
  toast(e.billed?'Marked as billed ✓':'Marked as unbilled');
}

// ── CLIENT ADD/EDIT ──
function openClientSheet(id=null) {
  editClientId=id;
  document.getElementById('client-sheet-title').textContent=id?'Edit client':'Add client';
  document.getElementById('c-err').style.display='none';
  const c=id?clients.find(x=>x.id===id):null;
  document.getElementById('c-name').value =c?.name ||'';
  document.getElementById('c-ref').value  =c?.ref  ||'';
  document.getElementById('c-notes').value=c?.notes||'';
  openOverlay('client-overlay');
}

async function saveClient() {
  const name=document.getElementById('c-name').value.trim();
  const ref =document.getElementById('c-ref').value.trim();
  const notes=document.getElementById('c-notes').value.trim();
  const err=document.getElementById('c-err');
  if(!name) { err.textContent='Name is required'; err.style.display='block'; return; }
  if(editClientId) {
    const c=clients.find(x=>x.id===editClientId);
    if(c) { c.name=name; c.ref=ref||null; c.notes=notes||null; }
    await sb.from('clients').update({name,ref:ref||null,notes:notes||null}).eq('id',editClientId);
  } else {
    const newClient={id:uid(),name,ref:ref||null,notes:notes||null,archived:false};
    await sb.from('clients').insert({id:newClient.id,name,ref:ref||null,notes:notes||null,archived:false});
    clients.push(newClient);
  }
  closeOverlay('client-overlay'); renderClients();
  toast(editClientId?'Client updated ✓':'Client added ✓');
}

async function toggleArchive(id,archive) {
  const c=clients.find(x=>x.id===id); if(c) c.archived=archive;
  await sb.from('clients').update({archived:archive}).eq('id',id);
  renderClients(); toast(archive?'Client archived':'Client restored');
}

  const active=clients.filter(c=>!c.archived);
  const h=Math.floor(e.mins/60), m=e.mins%60;
  document.getElementById('edit-content').innerHTML=`
    <div class="field"><label>Category</label>
      <select id="e-cat">${CATS.map(c=>`<option value="${c.id}"${e.cat===c.id?' selected':''}>${c.icon} ${c.label}</option>`).join('')}</select>
    </div>
    <div class="field"><label>Client</label>
      <select id="e-client">
        <option value="">— General —</option>
        ${active.map(c=>`<option value="${c.id}"${e.clientId===c.id?' selected':''}>${esc(c.name)}</option>`).join('')}
      </select>
    </div>
    <div class="dur-row">
      <div class="field"><label>Hours</label><input type="number" id="e-h" min="0" max="24" value="${h}"/></div>
      <div class="field"><label>Minutes</label><input type="number" id="e-m" min="0" max="59" value="${m}"/></div>
    </div>
    <div class="field"><label>Date</label><input type="date" id="e-date" value="${e.date}"/></div>
    <div class="field"><label>Notes</label><textarea id="e-notes">${e.notes||''}</textarea></div>
    <div id="e-err" class="err" style="display:none"></div>
    <div class="sheet-actions">
      <button class="btn btn-secondary" onclick="closeOverlay('edit-overlay')">Cancel</button>
      <button class="btn btn-danger btn-sm" onclick="deleteEntry('${id}')">Delete</button>
      <button class="btn btn-primary" onclick="updateEntry('${id}')">Update</button>
    </div>`;
  openOverlay('edit-overlay');
}

async function updateEntry(id) {
  const err=document.getElementById('e-err');
  const h=parseInt(document.getElementById('e-h').value)||0;
  const m=parseInt(document.getElementById('e-m').value)||0;
  if(h*60+m<=0) { err.textContent='Please enter a duration'; err.style.display='block'; return; }
  const e=entries.find(x=>x.id===id);
  if(e) {
    e.cat=document.getElementById('e-cat').value;
    e.clientId=document.getElementById('e-client').value||null;
    e.mins=h*60+m;
    e.date=document.getElementById('e-date').value;
    e.notes=document.getElementById('e-notes').value.trim()||null;
    await sb.from('entires').update({
      cat:e.cat, client_id:e.clientId, mins:e.mins, date:e.date, notes:e.notes
    }).eq('id',id);
  }
  closeOverlay('edit-overlay'); toast('Entry updated ✓');
  refreshDash();
  if(document.getElementById('screen-history').classList.contains('active')) loadHistory();
  if(document.getElementById('screen-clients').classList.contains('active')) renderClients();
  if(detailClientId) renderDetailSheet();
}

async function deleteEntry(id) {
  if(!confirm('Delete this entry?')) return;
  entries=entries.filter(e=>e.id!==id);
  await sb.from('entires').delete().eq('id',id);
  closeOverlay('edit-overlay'); toast('Entry deleted');
  refreshDash(); loadHistory(); renderClients();
}
</script>
</body>
</html>
